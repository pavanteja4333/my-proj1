apiVersion: batch/v1
kind: Job
metadata:
  name: post-sync-endpoint-check
  namespace: default           # Must be the same namespace as your application
  annotations:
    # 1. Declares this as a PostSync hook
    argocd.argoproj.io/hook: PostSync
    
    # 2. Deletes the job if it succeeds, but cleans up old jobs before creating a new one
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    metadata:
      labels:
        app: post-sync-checker
    spec:
      containers:
      - name: check-endpoint
        image: alpine:latest  # A lightweight image with curl available
        command: ["/bin/sh", "-c"]
        args:
          - |
            exit 0  # Replace this with your actual health check script. Exiting with 0 means success, any other value indicates failure.
      restartPolicy: Never
  # If the job script exits with 1, it will try only 1 more time before failing completely